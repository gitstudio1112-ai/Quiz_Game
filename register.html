<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Quiz Management System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:400px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.container h2{
text-align:center;
margin-bottom:25px;
color:#1e3c72;
}

.input-box{
margin-bottom:18px;
}

.input-box label{
display:block;
margin-bottom:6px;
font-weight:bold;
color:#333;
}

.input-box input,
.input-box select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

.checkbox{
display:flex;
align-items:center;
margin-bottom:18px;
}

.checkbox input{
margin-right:10px;
}

button{
width:100%;
padding:12px;
background:#1e3c72;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#16305d;
}

.login-link{
text-align:center;
margin-top:18px;
}

.login-link a{
text-decoration:none;
color:#1e3c72;
font-weight:bold;
}

.login-link a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form>

<div class="input-box">
<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>
</div>

<div class="input-box">
<label>Email</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="input-box">
<label>Password</label>
<input type="password" placeholder="Enter password" required>
</div>

<div class="input-box">
<label>Confirm Password</label>
<input type="password" placeholder="Confirm password" required>
</div>

<div class="input-box">
<label>Date of Birth</label>
<input type="date" required>
</div>

<div class="input-box">
<label>Select Role</label>
<select required>
<option value="">Choose Role</option>
<option>Student</option>
<option>Teacher</option>
</select>
</div>

<div class="checkbox">
<input type="checkbox" required>
<label>I agree to the Terms & Conditions</label>
</div>

<button type="submit">Register</button>

<div class="login-link">
Already have an account?
<a href="login.html">Login</a>
</div>

</form>

</div>

</body>
</html>
