<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

/* Sidebar */

.sidebar{
width:250px;
height:100vh;
background:#1e3c72;
position:fixed;
left:0;
top:0;
}

.sidebar h2{
color:white;
text-align:center;
padding:20px;
border-bottom:1px solid rgba(255,255,255,.2);
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
transition:.3s;
}

.sidebar a:hover,
.sidebar .active{
background:#2a5298;
}

/* Main Content */

.main{
margin-left:250px;
padding:40px;
}

.form-box{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.form-box h1{
text-align:center;
color:#1e3c72;
margin-bottom:30px;
}

.input-group{
margin-bottom:20px;
}

.input-group label{
display:block;
font-weight:bold;
margin-bottom:8px;
}

.input-group input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

.buttons{
text-align:center;
margin-top:20px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.save{
background:#28a745;
color:white;
}

.reset{
background:#ffc107;
color:black;
}

.cancel{
background:#dc3545;
color:white;
}

button:hover{
opacity:0.9;
}

</style>

</head>
<body>

<div class="sidebar">

<h2>Quiz Game</h2>

<a href="student_dashboard.html">🏠 Dashboard</a>
<a href="available_quiz.html">📝 Available Quiz</a>
<a href="quiz_history.html">📜 Quiz History</a>
<a href="results.html">📊 Results</a>
<a href="leaderboard.html">🏆 Leaderboard</a>
<a href="profile.html">👤 Profile</a>
<a href="login.html">🚪 Logout</a>

</div>

<div class="main">

<div class="form-box">

<h1>🔑 Change Password</h1>

<form onsubmit="changePassword(event)">

<div class="input-group">
<label>Current Password</label>
<input type="password" id="current" required>
</div>

<div class="input-group">
<label>New Password</label>
<input type="password" id="newpass" required>
</div>

<div class="input-group">
<label>Confirm New Password</label>
<input type="password" id="confirm" required>
</div>

<div class="buttons">

<button type="submit" class="save">Save Password</button>

<button type="reset" class="reset">Reset</button>

<button type="button" class="cancel" onclick="window.location='profile.html'">Cancel</button>

</div>

</form>

</div>

</div>

<script>

function changePassword(event){

event.preventDefault();

let newPass=document.getElementById("newpass").value;
let confirmPass=document.getElementById("confirm").value;

if(newPass!==confirmPass){

alert("New Password and Confirm Password do not match!");

return;

}

alert("Password Changed Successfully!");

window.location.href="profile.html";

}

</script>

</body>
</html>
