<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

/* Sidebar */

.sidebar{
width:250px;
height:100vh;
background:#1e3c72;
position:fixed;
left:0;
top:0;
}

.sidebar h2{
color:white;
text-align:center;
padding:20px;
border-bottom:1px solid rgba(255,255,255,.2);
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
transition:.3s;
}

.sidebar a:hover,
.sidebar .active{
background:#2a5298;
}

/* Main */

.main{
margin-left:250px;
padding:40px;
}

.form-box{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.form-box h1{
text-align:center;
color:#1e3c72;
margin-bottom:30px;
}

.profile-img{
text-align:center;
margin-bottom:20px;
}

.profile-img img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #1e3c72;
margin-bottom:10px;
}

.profile-img input{
display:block;
margin:auto;
}

.input-group{
margin-bottom:18px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

.input-group input,
.input-group textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

.buttons{
text-align:center;
margin-top:25px;
}

.save{
background:#28a745;
color:white;
}

.reset{
background:#ffc107;
color:black;
}

.cancel{
background:#dc3545;
color:white;
}

button{
padding:12px 25px;
border:none;
border-radius:6px;
margin:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Quiz Game</h2>

<a href="student_dashboard.html">🏠 Dashboard</a>
<a href="available_quiz.html">📝 Available Quiz</a>
<a href="quiz_history.html">📜 Quiz History</a>
<a href="results.html">📊 Results</a>
<a href="leaderboard.html">🏆 Leaderboard</a>
<a href="profile.html" class="active">👤 Profile</a>
<a href="login.html">🚪 Logout</a>

</div>

<div class="main">

<div class="form-box">

<h1>Edit Profile</h1>

<form onsubmit="saveProfile(event)">

<div class="profile-img">

<img src="https://via.placeholder.com/120" id="preview">

<input type="file" onchange="loadImage(event)">

</div>

<div class="input-group">
<label>Full Name</label>
<input type="text" value="Dhrumil Patel" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" value="dhrumil@example.com" required>
</div>

<div class="input-group">
<label>Phone</label>
<input type="text" value="9876543210">
</div>

<div class="input-group">
<label>Date of Birth</label>
<input type="date">
</div>

<div class="input-group">
<label>Course</label>
<input type="text" value="BCA">
</div>

<div class="input-group">
<label>Department</label>
<input type="text" value="Computer Science">
</div>

<div class="input-group">
<label>Address</label>
<textarea rows="4">Ahmedabad, Gujarat</textarea>
</div>

<div class="buttons">

<button class="save" type="submit">💾 Save Changes</button>

<button class="reset" type="reset">🔄 Reset</button>

<button class="cancel" type="button" onclick="window.location='profile.html'">❌ Cancel</button>

</div>

</form>

</div>

</div>

<script>

function saveProfile(event){

event.preventDefault();

alert("Profile Updated Successfully!");

window.location.href="profile.html";

}

function loadImage(event){

document.getElementById("preview").src =
URL.createObjectURL(event.target.files[0]);

}

</script>

</body>
</html>
